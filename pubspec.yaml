name: minnano_review_app
description: "みんなのレビュー — App Store レビュー横断解析アプリ"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.6.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # Firebase
  firebase_core: ^3.13.0
  cloud_firestore: ^5.6.6
  cloud_functions: ^5.3.4
  firebase_analytics: ^11.4.4

  # State management & routing
  flutter_riverpod: ^2.6.1
  go_router: ^14.8.1
  flutter_web_plugins:
    sdk: flutter

  # UI
  cached_network_image: ^3.4.1
  fl_chart: ^0.70.2
  google_fonts: ^6.2.1

  # Persistence
  shared_preferences: ^2.3.3

  # Ads
  google_mobile_ads: ^5.2.0

  # Share
  share_plus: ^10.1.4
  intl: ^0.20.1

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true

  assets:
    - asstes/
